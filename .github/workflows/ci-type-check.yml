name: "ci: type-check"

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  type-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore type-check caches
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
            tsconfig.tsbuildinfo
          key: ${{ runner.os }}-type-check-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'next.config.ts', 'tsconfig.json', 'src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-type-check-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'next.config.ts', 'tsconfig.json') }}-
            ${{ runner.os }}-type-check-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm type-check