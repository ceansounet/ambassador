name: "ci: lint"

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Restore lint caches
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            .stylelintcache
          key: ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json', 'src/**/*', 'public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json') }}-
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint checks
        run: pnpm lint