name: "ci: lint"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    uses: ./.github/workflows/_submodule-change-gate.yml

  lint:
    needs: changes
    if: needs.changes.outputs.should_run == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Set up pnpm with Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.25.0 --activate

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Restore pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Restore lint caches
        uses: actions/cache@v5
        with:
          path: |
            .eslintcache
            .stylelintcache
          key: ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json', 'src/**/*', 'public/**/*') }}
          restore-keys: |
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml', 'package.json', 'eslint.config.mjs', 'stylelint.config.mjs', '.htmlvalidate.json') }}-
            ${{ runner.os }}-lint-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint checks
        run: pnpm lint
